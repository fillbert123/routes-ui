<div class="figure-item" (click)="emitItem()">
  @if (status != 'empty') {
    <div class="figure-item__content">
      <component-badge
        [kind]="'station'"
        [status]="status"
        [color]="color"
        [label]="label"
      />
      <p class="figure-item__content__label bold medium">{{name}}</p>
    </div>
  }
  @else {
    <div class="figure-item-empty"></div>
  }
</div>
