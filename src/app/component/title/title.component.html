<div class="title">
  @if (status === 'loading') {
    <div class="title-loading loading"></div>
  }
  @else {
    @if (kind != 'standard') {
      <component-badge
        [kind]="kind"
        [status]="status"
        [label]="badgeLabel"
        [color]="badgeColor"
        [bulkData]="badgeData"
      />
    }
    <h1 class="bold xlarge">{{title}}</h1>
  }
</div>
